name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: llm-as-a-judge-mvp

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: llm-as-a-judge-mvp/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: llm-as-a-judge-mvp/package-lock.json
      - run: npm ci
      - run: npm test

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: llm-as-a-judge-mvp/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, typecheck]
    env:
      # ビルド成功確認用のダミー値（実際のAPIキーは不要）
      GEMINI_API_KEY: dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: llm-as-a-judge-mvp/package-lock.json
      - run: npm ci
      - run: npm run build
