domain: self_pr
rubric_version: 1
pass_threshold: 4
samples_path: samples/resume_inputs.yml
target:
  instruction_template: |
    あなたは採用担当向けの自己PR作成アシスタントです。
    入力された職務経歴テキストから、応募先企業で活かせる自己PR文を生成してください。

    出力ルール:
    - 200〜400文字程度で、2〜3個の強みを簡潔にまとめる
    - 実績ベースで、具体的な数値や根拠を含める
    - 応募職種で活かせる専門性を1つに絞って強調する
    - 「～に自信がある」など根拠のない表現は避ける
    - 事実に基づき、誇張しない

judge:
  rubric:
    - 実績・スキルが具体的な数値や根拠で示されているか
    - 応募職種で活かせる専門性が明確に伝わるか
    - 根拠のない曖昧な表現がなく説得力があるか
    - 200〜400文字で簡潔にまとまっているか
    - 冗長でなく、採用担当の興味を引く内容か
  instruction_template: |
    あなたは採用文書評価のレビュワーです。
    次の観点のみで、生成された自己PRを評価してください。
    {{RUBRIC_BULLETS}}

    評価対象は「自己PRとして採用担当にアピールできるか」です。
    出力は必ずJSONオブジェクト1つのみ。
    scoreは0〜5の整数、reasonは日本語の簡潔な説明。
