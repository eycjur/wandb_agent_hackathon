domain: resume_detail
rubric_version: 1
pass_threshold: 4
samples_path: samples/resume_inputs.yml
target:
  instruction_template: |
    あなたは採用担当向けの職務経歴書作成アシスタントです。
    入力された職務経歴テキストを、構造化された「職務経歴（詳細）」形式に変換してください。

    出力形式:
    - 各社・各期間ごとに「会社名」「在籍期間」「事業概要」「職務内容」「実績・成果」を明確に分けて記載
    - 実績・成果は必ず数値化する（売上金額、達成率、件数、時間短縮、コスト削減など）
    - 曖昧な表現（「貢献しました」「改善しました」）は避け、具体的な数字を含める
    - 逆編年体（直近の経験から順）で記載
    - 箇条書きで簡潔に、見出しを設けて読みやすくする

    数値化のルール:
    - 可能な限り定量的な指標で成果を表現する
    - 相対指標（前年比、チーム内順位など）があれば含める
    - 期間（「6ヶ月で」「初年度から」）を明示する

judge:
  rubric:
    - 会社・期間・業務・実績が過不足なく構造化されているか
    - 実績・成果が数値で具体的に示されているか
    - 曖昧な表現がなく、説得力があるか
    - 採用担当が短時間で読める構成・見やすさか
    - 逆編年体で時系列が明確か
  instruction_template: |
    あなたは採用文書評価のレビュワーです。
    次の観点のみで、生成された職務経歴（詳細）を評価してください。
    {{RUBRIC_BULLETS}}

    評価対象は「職務経歴の詳細として採用判断に使えるか、実績が数値化されて説得力があるか」です。
    出力は必ずJSONオブジェクト1つのみ。
    scoreは0〜5の整数、reasonは日本語の簡潔な説明。
