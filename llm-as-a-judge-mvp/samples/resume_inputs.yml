samples:
  - title: Web開発エンジニア
    input: |
      2017年に独立系SIerへ新卒入社し、最初の2年間は地方銀行向けインターネットバンキングの保守開発を担当しました。Java（Spring Boot）とOracleを使い、口座照会・振込機能の改修、障害一次対応、深夜リリースの手順整備まで一貫して担当しました。2019年にはバッチ処理遅延が頻発していたため、SQLチューニングと処理分割を行い、夜間バッチの完了時刻を平均45分短縮しました。チームは8名で、私はサブリーダーとして2名のコードレビューと進捗管理を担当しました。

      2020年に事業会社（BtoB SaaS）へ転職し、バックエンドエンジニアとして請求・契約管理ドメインのAPI開発を担当しました。Go、TypeScript、PostgreSQL、GCP（Cloud Run / Cloud SQL / Pub/Sub）を利用し、モノリシックAPIから段階的にサービス分割を進めました。特に請求計算ロジックの刷新プロジェクトでは、業務部門と仕様を再定義し、複雑だった条件分岐をルールエンジン化しました。結果として、月次の請求計算エラー件数を28件から4件に削減し、問い合わせ対応工数を月30時間削減しました。

      2022年以降はパフォーマンス改善と運用改善を主導し、APMを用いたボトルネック分析、インデックス設計見直し、キャッシュ導入を実施しました。主要APIのp95レスポンスタイムを420msから190msへ改善し、月次の重大インシデント件数を5件から2件へ抑制しました。また、SLOとエラーバジェットを導入して定例で可観測性レビューを実施し、開発チーム12名に向けて運用ガイドラインを整備しました。直近はテックリード補佐として、要件定義段階での技術選定、設計レビュー、オンコール体制の改善にも関与しています。
  - title: データアナリスト
    input: |
      2018年に全国展開する小売企業へ入社し、店舗運営部門で1年間、日次売上集計と在庫管理のオペレーションを担当しました。現場経験を経て、2019年に経営企画部のデータアナリストへ異動し、SQL（BigQuery）とPython（pandas, scikit-learn）で売上・粗利・来店客数の分析基盤を構築しました。部門ごとに分断されていたExcel集計をLooker Studioダッシュボードへ置き換え、週次レポート作成工数をチーム全体で週12時間削減しました。

      2020年からは需要予測モデル改善プロジェクトを担当し、商品カテゴリ別に予測手法を見直しました。従来は単純移動平均のみでしたが、季節性と販促イベントを特徴量化したモデルへ変更し、MAPEを24%から15%へ改善しました。特に飲料カテゴリでは欠品率を11.8%から7.9%まで低減し、機会損失売上を四半期あたり約1,200万円削減しました。モデル精度だけでなく、店舗側が使える発注ルールへ落とし込むため、SVと店長向けの運用手順書作成と説明会を実施しました。

      2022年以降は営業企画・マーケティング部門と連携し、KPIツリー再設計と施策検証プロセスの標準化を主導しました。ABテストの設計テンプレートを整備し、検証期間・評価指標・判定基準を共通化したことで、施策レビューの意思決定リードタイムを平均10日から4日に短縮しました。直近はシニアアナリストとして、データ品質監視（異常検知アラート）と若手2名のメンタリングも担当しています。
  - title: プロダクトマネージャー
    input: |
      2016年に業務系ソフトウェア企業へ入社し、最初の3年間はカスタマーサクセスとしてオンボーディング支援と活用定着を担当しました。担当顧客は中堅企業を中心に約40社で、解約理由のヒアリングや利用状況分析を通じて、初期設定のつまずきが継続率低下の主要因であることを特定しました。2019年にプロダクトマネージャーへ転向し、この課題を解決するためのオンボーディング体験改善を最初のテーマとして推進しました。

      PMとしては、顧客インタビュー（月8〜10件）、プロダクト分析（Mixpanel / BigQuery）、営業・CSからのVOCをもとに、四半期単位のロードマップ策定を担当しました。開発チーム（エンジニア7名、デザイナー1名、QA1名）と連携し、要件定義からリリース判定までを主導しました。特に初期設定ウィザード改善、テンプレート機能追加、権限設定の簡素化を実施し、初月継続率を67%から81%へ改善、オンボーディング期間中央値を21日から13日に短縮しました。

      2022年以降はマルチプロダクト化に伴い、プライシング改定と連携機能拡張の企画も担当しました。既存顧客への影響を抑えるため、段階リリースと計測指標を定義し、リリース後8週間のモニタリングを実施しました。その結果、アップセル率を四半期で14%向上させつつ、価格改定起因の解約率を1%未満に抑制しました。また、部門横断で意思決定が遅延していたため、PRDテンプレートとレビュー会運用を標準化し、企画起票から開発着手までのリードタイムを平均30%短縮しました。現在はグループPMとして、2プロダクトの優先順位調整と若手PM育成を担当しています。
